  const DEG = d => d * Math.PI / 180;
  const LOGO_W = 36;
  const DEPTH = 7;
  const N = 10;
  const TILT = DEG(-12);
  const MIN_W = 1;

  const HALF = 2.5;        // 편도(180도) 시간(초)
  const DWELL = 0.4;       // 정면 정지 시간(초)
  const SWAP = DEG(125);   // 쿠팡 → N Pay 교체 각도 (90도보다 더 돈 지점)
  const FADE = DEG(16);    // 교체 크로스페이드 폭

  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const STEPS = 6;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function loadLogo(src, dispW, dispH){
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const bw = Math.round(dispW * DPR);
        const bh = Math.round(dispH * DPR);
        function bake(brightness, mirror){
          const c = document.createElement('canvas');
          c.width = bw; c.height = bh;
          const g = c.getContext('2d');
          if (mirror){ g.translate(bw, 0); g.scale(-1, 1); }
          g.drawImage(img, 0, 0, bw, bh);
          g.setTransform(1,0,0,1,0,0);
          g.globalCompositeOperation = 'source-atop';
          g.fillStyle = 'rgba(0,0,0,' + (1 - brightness).toFixed(3) + ')';
          g.fillRect(0, 0, bw, bh);
          return c;
        }
        const front = [], back = [];
        for (let s = 0; s < STEPS; s++){
          const b = 0.55 + (s / (STEPS - 1)) * 0.45; // 작은 크기: 음영을 밝게 유지
          front.push(bake(b, false));
          back.push(bake(b, true));
        }
        resolve({ front, back, w: dispW, h: dispH });
      };
      img.src = src;
    });
  }

  // 임의 각도의 로고를 그린다 (뒷면은 좌우반전 이미지, 화가 알고리즘)
  function drawLogo(logo, theta, alpha, CX, CY){
    if (alpha <= 0.003) return;
    const cos = Math.cos(theta), sin = Math.sin(theta);
    const facingBack = cos < 0;
    const imgs = facingBack ? logo.back : logo.front;
    const sliceW = Math.max(logo.w * Math.abs(cos), MIN_W);

    ctx.globalAlpha = alpha;
    for (let k = 0; k <= N; k++){
      const zi = facingBack ? (N - k) : k;
      const z = -DEPTH/2 + (DEPTH * zi) / N;
      const px = z * sin;
      const py = -z * cos * Math.sin(TILT);
      const step = Math.min(STEPS - 1, Math.round((k / N) * (STEPS - 1)));
      ctx.drawImage(imgs[step],
        CX + px - sliceW / 2,
        CY + py - logo.h / 2,
        sliceW, logo.h);
    }
    ctx.globalAlpha = 1;
  }

  const clamp01 = v => Math.max(0, Math.min(1, v));
  const smooth = v => { v = clamp01(v); return v * v * (3 - 2 * v); };

  Promise.all([
    loadLogo(COUPANG_SRC, LOGO_W, LOGO_W),
    loadLogo(NPAY_SRC, 44, 15)   // 46x16에서 2px 줄임
  ]).then(([coupang, npay]) => {

    const stage = cv.parentElement.getBoundingClientRect();
    cv.width  = Math.round(stage.width * DPR);
    cv.height = Math.round(stage.height * DPR);
    ctx.scale(DPR, DPR);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const CX = stage.width / 2, CY = stage.height / 2;

    const CYC = 2 * (HALF + DWELL);
    const t0 = performance.now();

    function frame(now){
      const t = (((now - t0) / 1000)) % CYC;
      let p;
      if (t < HALF)                    p = t / HALF;                       // 쿠팡 → N Pay
      else if (t < HALF + DWELL)       p = 1;                              // N Pay 정면 정지
      else if (t < 2 * HALF + DWELL)   p = 1 - (t - HALF - DWELL) / HALF;  // N Pay → 쿠팡
      else                             p = 0;                              // 쿠팡 정면 정지

      // 코사인 이징: 정면에서 느리고 옆면에서 빠르게
      const theta = -(Math.PI / 2) * (1 - Math.cos(Math.PI * p));
      const ang = -theta; // 0(쿠팡 정면) ~ PI(N Pay 정면)

      // 교체 각도(125도) 전까지는 쿠팡(뒷면 포함)이 보이고, 그 후 N Pay로 크로스페이드
      const mix = smooth((ang - (SWAP - FADE)) / FADE);

      ctx.clearRect(0, 0, stage.width, stage.height);
      drawLogo(coupang, theta, 1 - mix, CX, CY);
      drawLogo(npay, theta + Math.PI, mix, CX, CY);

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
